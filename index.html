<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>舞蹈排隊形</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* 深太空藍黑 */
            color: #f8fafc;
            margin: 0;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; 
        }

        h2 {
            color: #f8fafc;
            margin: 8px 0 12px 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .control-panel {
            background: #1e293b; /* 炭灰色卡片 */
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 340px; 
            box-sizing: border-box;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            align-items: center;
            width: 100%;
            height: 38px;
        }

        .col-left { display: flex; justify-content: flex-start; align-items: center; }
        .col-center { display: flex; justify-content: center; align-items: center; }
        .col-right { display: flex; justify-content: flex-end; align-items: center; }

        button {
            width: 95px; /* 所有按鈕等寬 */
            height: 36px;
            border: none;
            border-radius: 8px;
            background-color: #334155; /* 沉穩暗灰色 */
            color: #f8fafc;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.15s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        button:hover { background-color: #475569; }
        button:active { transform: scale(0.96); }
        button:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .btn-secondary { background-color: #334155; color: #f8fafc; }
        .btn-success { background-color: #16a34a; color: white; } 
        .btn-success:hover { background-color: #15803d; }
        .btn-danger { background-color: #dc2626; color: white; }  
        .btn-danger:hover { background-color: #b91c1c; }
        .btn-gray { background-color: #475569 !important; color: #f8fafc !important;}
        .btn-gray:hover { background-color: #334155 !important; }

        .btn-sm {
            width: auto !important;
            height: auto !important;
            padding: 5px 8px;
            font-size: 11px;
            border-radius: 6px;
        }

        .formation-status {
            font-size: 14px;
            font-weight: 700;
            color: #f8fafc;
            text-align: center;
        }

        .stage-container {
            position: relative;
            width: 100%;
            max-width: 800px; 
        }

        .stage-front {
            text-align: center;
            background-color: #1e293b;
            color: #f8fafc;
            padding: 7px 0;
            font-size: 11px;
            font-weight: 700;
            border-radius: 12px 12px 0 0;
            letter-spacing: 2px;
        }

        #scalerContainer {
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #stage {
            width: 800px;
            height: 500px;
            background-color: #ffffff;
            border: 3px solid #1e293b;
            border-radius: 0 0 12px 12px;
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            transform-origin: top center; 
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        .grid-line {
            position: absolute;
            pointer-events: none;
            border-style: dashed;
            border-color: #cbd5e0; 
            border-width: 0;
        }
        
        .hl-1, .hl-2, .hl-3 { left: 0; right: 0; border-top-width: 1px; }
        .hl-1 { top: 125px; border-color: #f1f5f9; }
        .hl-2 { top: 250px; border-color: #94a3b8; border-top-width: 1.5px; } /* 水平中央主軸 */
        .hl-3 { top: 375px; border-color: #f1f5f9; }

        .vl-1, .vl-2, .vl-3, .vl-4, .vl-5 { top: 0; bottom: 0; border-left-width: 1px; }
        .vl-1 { left: 133.33px; border-color: #f1f5f9; }
        .vl-2 { left: 266.67px; border-color: #f1f5f9; }
        .vl-3 { left: 400px; border-color: #94a3b8; border-left-width: 1.5px; } /* 垂直中央主軸 */
        .vl-4 { left: 533.33px; border-color: #f1f5f9; }
        .vl-5 { left: 666.67px; border-color: #f1f5f9; }

        .dancer {
            width: 60px;  
            height: 60px; 
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            user-select: none;
            touch-action: none; 
            transition: none; 
            border: 2px solid rgba(0, 0, 0, 0.12); 
            box-sizing: border-box;
        }

        .dancer:active {
            transform: scale(1.12);
            filter: brightness(1.15); 
        }

        .dancer .dancer-label {
            color: white;
            font-weight: 700;
            font-size: 16px;
            pointer-events: none; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.5); 
        }

        .fading-out { pointer-events: none; }

        .manager-panel {
            background: #1e293b;
            width: 100%;
            max-width: 800px;
            margin-top: 14px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 14px;
            box-sizing: border-box;
        }

        .manager-title {
            font-size: 14px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 10px;
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
        }

        .formation-list {
            max-height: 160px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
        }

        .formation-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #334155;
            padding: 8px 12px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .formation-item.active {
            background: #1e40af; 
            border-left: 4px solid #3b82f6;
        }

        .item-name {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
            cursor: pointer;
            flex-grow: 1;
        }

        .item-actions {
            display: flex;
            gap: 5px;
        }

        /* 自訂對話框與 Notification 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }
        .modal-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 280px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: center;
            border: 1px solid #334155;
        }
        .modal-body {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        #promptInput {
            width: 100%;
            padding: 8px;
            border: none;
            background-color: #334155;
            border-radius: 8px;
            text-align: center;
            color: #f8fafc;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
        }
        #promptInput:focus {
            outline: 2px solid #3b82f6;
        }
        .toast-container {
            position: fixed;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 10100;
            pointer-events: none;
            left: 50%;
            transform: translateX(-50%);
        }
        .toast {
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #334155;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h2>舞蹈排位</h2>

    <div class="control-panel">
        <!-- 行 1：[-] | 10 人 | [+] -->
        <div class="control-row">
            <div class="col-left">
                <button onclick="adjustDancerCount(-1)" class="btn-secondary">➖ 減少</button>
            </div>
            <div class="col-center">
                <span id="dancerCountDisplay" class="formation-status">5 人</span>
            </div>
            <div class="col-right">
                <button onclick="adjustDancerCount(1)" class="btn-secondary">➕ 增加</button>
            </div>
        </div>
        
        <!-- 行 2：上一幕 | 0/0 | 下一幕 -->
        <div class="control-row">
            <div class="col-left">
                <button class="btn-secondary" onclick="prevFormation()">◀ 上一幕</button>
            </div>
            <div class="col-center">
                <span class="formation-status" id="formationDisplay">0 / 0</span>
            </div>
            <div class="col-right">
                <button class="btn-secondary" onclick="nextFormation()">下一幕 ▶</button>
            </div>
        </div>

        <!-- 行 3：新增隊形 | | 儲存隊形 -->
        <div class="control-row">
            <div class="col-left">
                <button class="btn-success" onclick="saveAsNewFormation()">新增隊形</button>
            </div>
            <div class="col-center"></div>
            <div class="col-right">
                <button onclick="updateCurrentFormation()">儲存隊形</button>
            </div>
        </div>

        <!-- 行 4：播放 | 速度BAR (跨中、右欄，讓拉桿可以更長更美觀) -->
        <div class="control-row">
            <div class="col-left">
                <button onclick="togglePlay()" id="playBtn">▶ 播放</button>
            </div>
            <div style="grid-column: span 2; display: flex; align-items: center; justify-content: flex-end; gap: 8px; width: 100%; box-sizing: border-box; padding-right: 2px;">
                <input type="range" id="animSpeed" min="0.2" max="2.0" step="0.1" value="0.6" style="width: 140px; accent-color: #3b82f6; cursor: pointer;">
                <span id="speedVal" style="font-size: 13px; font-weight: 600; min-width: 32px; color:#94a3b8; text-align: right;">0.6s</span>
            </div>
        </div>

        <!-- 行 5：匯出 | 匯入 | 清空 -->
        <div class="control-row">
            <div class="col-left">
                <button onclick="exportFormations()">📤 匯出</button>
            </div>
            <div class="col-center">
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importFormations(this)">
                <button onclick="document.getElementById('importFile').click()">📥 匯入</button>
            </div>
            <div class="col-right">
                <button class="btn-danger" onclick="clearAllData()">🗑️ 清空</button>
            </div>
        </div>
    </div>

    <!-- 舞台區域 -->
    <div class="stage-container">
        <div class="stage-front">▲ 舞台前方 (FRONT) ▲</div>
        <div id="scalerContainer">
            <div id="stage">
                <!-- 網格底圖：3 橫 5 直精密十字線 -->
                <div class="grid-line hl-1"></div>
                <div class="grid-line hl-2"></div>
                <div class="grid-line hl-3"></div>
                <div class="grid-line vl-1"></div>
                <div class="grid-line vl-2"></div>
                <div class="grid-line vl-3"></div>
                <div class="grid-line vl-4"></div>
                <div class="grid-line vl-5"></div>
            </div>
        </div>
    </div>

    <!-- 隊形順序管理面板 -->
    <div class="manager-panel">
        <div class="manager-title">📋 隊形順序</div>
        <div class="formation-list" id="formationListContainer">
            <div style="color:#64748b; font-size:12px; text-align:center; padding: 10px;">暫無儲存隊形，請先點擊「新增隊形」</div>
        </div>
    </div>

    <!-- 自訂 Modal 節點 -->
    <div id="customModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div id="modalMessage" class="modal-body"></div>
            <div class="modal-actions">
                <button id="modalCancelBtn" class="btn-secondary">取消</button>
                <button id="modalConfirmBtn" class="btn-success">確認</button>
            </div>
        </div>
    </div>

    <div id="customPrompt" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div id="promptMessage" class="modal-body" style="font-weight: 600; margin-bottom: 5px;">請輸入舞者新代號</div>
            <input type="text" id="promptInput" maxlength="3" autocomplete="off">
            <div class="modal-actions" style="margin-top: 12px;">
                <button id="promptCancelBtn" class="btn-secondary">取消</button>
                <button id="promptConfirmBtn" class="btn-success">確認</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        let formations = []; 
        let currentIndex = -1; 
        let playInterval = null; 
        let currentScale = 1; 
        let dancerHistoryCache = {}; // 記憶已被移除舞者位置與名稱的臨時快取

        const dancerColors = [
            { bg: '#ef4444', glow: 'rgba(239, 68, 68, 0.4)' }, // 1. 紅
            { bg: '#f472b6', glow: 'rgba(244, 114, 182, 0.4)' }, // 2. 粉
            { bg: '#f97316', glow: 'rgba(249, 115, 22, 0.4)' }, // 3. 橘
            { bg: '#eab308', glow: 'rgba(234, 179, 8, 0.4)' },  // 4. 黃
            { bg: '#22c55e', glow: 'rgba(34, 197, 94, 0.4)' },  // 5. 綠
            { bg: '#06b6d4', glow: 'rgba(6, 182, 212, 0.4)' },  // 6. 淺藍
            { bg: '#1d4ed8', glow: 'rgba(29, 78, 216, 0.4)' },  // 7. 深藍
            { bg: '#8b5cf6', glow: 'rgba(139, 92, 246, 0.4)' }, // 8. 紫
            { bg: '#78350f', glow: 'rgba(120, 53, 15, 0.4)' },  // 9. 褐
            { bg: '#111827', glow: 'rgba(17, 24, 39, 0.4)' }   // 10. 黑
        ];

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function showConfirm(message, callback) {
            const modal = document.getElementById('customModal');
            const msgEl = document.getElementById('modalMessage');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');

            msgEl.textContent = message;
            modal.style.display = 'flex';

            function cleanup() {
                modal.style.display = 'none';
                confirmBtn.removeEventListener('click', onConfirm);
                cancelBtn.removeEventListener('click', onCancel);
            }
            function onConfirm() { cleanup(); if (callback) callback(); }
            function onCancel() { cleanup(); }

            confirmBtn.addEventListener('click', onConfirm);
            cancelBtn.addEventListener('click', onCancel);
        }

        function showPrompt(title, defaultValue, callback) {
            const modal = document.getElementById('customPrompt');
            const msgEl = document.getElementById('promptMessage');
            const input = document.getElementById('promptInput');
            const confirmBtn = document.getElementById('promptConfirmBtn');
            const cancelBtn = document.getElementById('promptCancelBtn');

            msgEl.textContent = title;
            input.value = defaultValue;
            modal.style.display = 'flex';
            setTimeout(() => { input.focus(); input.select(); }, 50);

            function cleanup() {
                modal.style.display = 'none';
                confirmBtn.removeEventListener('click', onConfirm);
                cancelBtn.removeEventListener('click', onCancel);
            }
            function onConfirm() { cleanup(); if (callback) callback(input.value); }
            function onCancel() { cleanup(); }

            confirmBtn.addEventListener('click', onConfirm);
            cancelBtn.addEventListener('click', onCancel);
        }

        function getActiveCacheKey() {
            return currentIndex === -1 ? "default" : currentIndex;
        }

        function resizeStage() {
            const containerWidth = scalerContainer.clientWidth;
            currentScale = Math.min(containerWidth / 800, 1); 
            stage.style.transform = `translateX(-50%) scale(${currentScale})`;
            scalerContainer.style.height = (500 * currentScale) + 'px';
        }

        window.addEventListener('resize', resizeStage);

        document.getElementById('animSpeed').addEventListener('input', function(e) {
            document.getElementById('speedVal').textContent = e.target.value + 's';
        });

        window.onload = function() {
            resizeStage(); 
            const autoSavedData = localStorage.getItem('danceFormationsData');
            if (autoSavedData) {
                try {
                    const parsed = JSON.parse(autoSavedData);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        formations = parsed;
                        currentIndex = 0;
                        renderFormation(currentIndex);
                        updateUI();
                        return;
                    }
                } catch (e) {
                    console.error("讀取自動存檔失敗", e);
                }
            }
            generateDefaultDancers(5);
        }

        function autoSaveToLocal() {
            localStorage.setItem('danceFormationsData', JSON.stringify(formations));
        }

        function saveCurrentState() {
            const key = getActiveCacheKey();
            if (!dancerHistoryCache[key]) dancerHistoryCache[key] = [];

            const activeDancers = Array.from(stage.querySelectorAll('.dancer:not(.fading-out)'));
            activeDancers.forEach(d => {
                const idx = parseInt(d.dataset.index);
                if (!isNaN(idx)) {
                    dancerHistoryCache[key][idx] = {
                        x: parseInt(d.style.left) || 0,
                        y: parseInt(d.style.top) || 0,
                        label: d.querySelector('.dancer-label').textContent
                    };
                }
            });

            if (currentIndex !== -1) {
                formations[currentIndex] = getStageState();
                autoSaveToLocal();
            }
        }

        function generateDefaultDancers(count) {
            stage.querySelectorAll('.dancer').forEach(d => d.remove());
            const spacing = 800 / (count + 1);
            dancerHistoryCache["default"] = []; 
            for (let i = 0; i < count; i++) {
                const x = spacing * (i + 1) - 30;
                const y = 250 - 30;
                const label = (i + 1).toString();
                createDancerElement(x, y, label, i);
                dancerHistoryCache["default"][i] = { x, y, label };
            }
            document.getElementById('dancerCountDisplay').textContent = `${count} 人`;
        }

        function adjustDancerCount(offset) {
            const currentDancers = stage.querySelectorAll('.dancer:not(.fading-out)');
            const currentCount = currentDancers.length;
            const targetCount = currentCount + offset;

            if (targetCount < 1 || targetCount > 30) return;

            document.getElementById('dancerCountDisplay').textContent = `${targetCount} 人`;

            if (targetCount > currentCount) {
                const key = getActiveCacheKey();
                for (let i = currentCount; i < targetCount; i++) {
                    const cached = (dancerHistoryCache[key] && dancerHistoryCache[key][i]);
                    if (cached) {
                        createDancerElement(cached.x, cached.y, cached.label, i);
                    } else {
                        const spacingOffset = (i - currentCount) * 15;
                        createDancerElement(400 - 30 + spacingOffset, 250 - 30 + spacingOffset, (i + 1).toString(), i);
                    }
                }
            } else {
                for (let i = currentCount - 1; i >= targetCount; i--) {
                    currentDancers[i].remove();
                }
            }
            saveCurrentState();
            updateUI();
        }

        function createDancerElement(x, y, label, index) {
            const dancer = document.createElement('div');
            dancer.className = 'dancer';
            dancer.style.left = x + 'px';
            dancer.style.top = y + 'px';
            dancer.dataset.index = index;

            const colorObj = dancerColors[index % 10];
            dancer.style.backgroundColor = colorObj.bg;
            dancer.style.boxShadow = `0 4px 10px ${colorObj.glow}`;

            const labelSpan = document.createElement('span');
            labelSpan.className = 'dancer-label';
            labelSpan.textContent = label;
            dancer.appendChild(labelSpan);

            let lastTap = 0;
            dancer.addEventListener('touchstart', function(e) {
                const now = Date.now();
                if (now - lastTap < 300) { editDancerLabel(labelSpan); }
                lastTap = now;
            });
            dancer.addEventListener('dblclick', function() { editDancerLabel(labelSpan); });

            setupDragAndDrop(dancer);
            stage.appendChild(dancer);
            return dancer;
        }

        function editDancerLabel(labelElement) {
            const currentName = labelElement.textContent;
            showPrompt("請輸入舞者新代號：", currentName, (newName) => {
                if (newName !== null) {
                    const trimmed = newName.trim();
                    labelElement.textContent = trimmed !== "" ? trimmed.substring(0, 3) : currentName;
                    saveCurrentState();
                }
            });
        }

        function setupDragAndDrop(element) {
            let isDragging = false;
            let lastClientX, lastClientY;

            function onStart(e) {
                if (element.classList.contains('fading-out')) return;
                isDragging = true;
                element.style.transition = 'none';
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                lastClientX = clientX;
                lastClientY = clientY;
            }

            function onMove(e) {
                if (!isDragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                let deltaX = (clientX - lastClientX) / currentScale;
                let deltaY = (clientY - lastClientY) / currentScale;

                let newX = (parseFloat(element.style.left) || 0) + deltaX;
                let newY = (parseFloat(element.style.top) || 0) + deltaY;

                const maxX = 800 - element.clientWidth;
                const maxY = 500 - element.clientHeight;
                
                newX = Math.max(0, Math.min(newX, maxX));
                newY = Math.max(0, Math.min(newY, maxY));

                element.style.left = newX + 'px';
                element.style.top = newY + 'px';

                lastClientX = clientX;
                lastClientY = clientY;
            }

            function onEnd() {
                if (isDragging) { saveCurrentState(); }
                isDragging = false;
            }

            element.addEventListener('mousedown', onStart);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);

            element.addEventListener('touchstart', onStart, { passive: true });
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        function getStageState() {
            return Array.from(stage.querySelectorAll('.dancer:not(.fading-out)')).map(d => ({
                x: parseInt(d.style.left) || 0,
                y: parseInt(d.style.top) || 0,
                label: d.querySelector('.dancer-label').textContent
            }));
        }

        function renderFormation(index) {
            if (index < 0 || index >= formations.length) return;
            const targetData = formations[index];
            const currentDancers = Array.from(stage.querySelectorAll('.dancer:not(.fading-out)'));
            const speed = document.getElementById('animSpeed').value;

            if (!dancerHistoryCache[index]) {
                dancerHistoryCache[index] = JSON.parse(JSON.stringify(targetData));
            }

            targetData.forEach((d, i) => {
                let dancer;
                if (i < currentDancers.length) {
                    dancer = currentDancers[i];
                    dancer.style.transition = `left ${speed}s ease-in-out, top ${speed}s ease-in-out, opacity ${speed}s`;
                    dancer.style.left = d.x + 'px';
                    dancer.style.top = d.y + 'px';
                    dancer.querySelector('.dancer-label').textContent = d.label;
                    dancer.style.opacity = '1';
                } else {
                    dancer = createDancerElement(d.x, d.y, d.label, i); 
                    dancer.style.opacity = '0';
                    dancer.style.transition = `opacity ${speed}s ease-in-out`;
                    dancer.offsetHeight; 
                    dancer.style.opacity = '1';
                }

                const colorObj = dancerColors[i % 10];
                dancer.style.backgroundColor = colorObj.bg;
                dancer.style.boxShadow = `0 4px 10px ${colorObj.glow}`;
            });

            if (currentDancers.length > targetData.length) {
                for (let i = targetData.length; i < currentDancers.length; i++) {
                    const extraDancer = currentDancers[i];
                    extraDancer.classList.add('fading-out');
                    extraDancer.style.transition = `opacity ${speed}s ease-in-out`;
                    extraDancer.style.opacity = '0';
                    setTimeout(() => { extraDancer.remove(); }, speed * 1000);
                }
            }
            document.getElementById('dancerCountDisplay').textContent = `${targetData.length} 人`;
        }

        function updateUI() {
            const display = document.getElementById('formationDisplay');
            const listContainer = document.getElementById('formationListContainer');
            
            if (formations.length === 0) {
                display.textContent = "0 / 0";
                listContainer.innerHTML = `<div style="color:#64748b; font-size:12px; text-align:center; padding: 10px;">暫無儲存隊形，請先點擊「新增隊形」</div>`;
                return;
            }

            display.textContent = `${currentIndex + 1} / ${formations.length}`;

            listContainer.innerHTML = formations.map((form, index) => {
                const isActive = index === currentIndex ? 'active' : '';
                const isFirst = index === 0 ? 'disabled' : '';
                const isLast = index === formations.length - 1 ? 'disabled' : '';
                return `
                    <div class="formation-item ${isActive}">
                        <span class="item-name" onclick="jumpToFormation(${index})">
                            第 ${index + 1} 幕隊形 (${form.length}人)
                        </span>
                        <div class="item-actions">
                            <button class="btn-sm" ${isFirst} onclick="event.stopPropagation(); swapFormations(${index}, ${index - 1})">⬆️</button>
                            <button class="btn-sm" ${isLast} onclick="event.stopPropagation(); swapFormations(${index}, ${index + 1})">⬇️</button>
                            <button class="btn-gray btn-sm" onclick="event.stopPropagation(); deleteSingleFormation(${index})">❌</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function jumpToFormation(index) {
            if (playInterval) togglePlay(); 
            currentIndex = index;
            renderFormation(currentIndex);
            updateUI();
        }

        function swapFormations(idx1, idx2) {
            const temp = formations[idx1];
            formations[idx1] = formations[idx2];
            formations[idx2] = temp;

            if (currentIndex === idx1) currentIndex = idx2;
            else if (currentIndex === idx2) currentIndex = idx1;

            autoSaveToLocal();
            renderFormation(currentIndex);
            updateUI();
        }

        function deleteSingleFormation(index) {
            showConfirm(`確定要刪除「第 ${index + 1} 幕隊形」嗎？`, () => {
                formations.splice(index, 1);
                if (formations.length === 0) {
                    currentIndex = -1;
                    generateDefaultDancers(5);
                } else {
                    if (currentIndex >= formations.length) currentIndex = formations.length - 1;
                    renderFormation(currentIndex);
                }
                autoSaveToLocal();
                updateUI();
                showToast("🧹 已刪除隊形");
            });
        }

        function saveAsNewFormation() {
            const currentState = getStageState();
            if (currentState.length === 0) return;
            
            const currentKey = getActiveCacheKey();
            formations.push(currentState);
            currentIndex = formations.length - 1;
            
            dancerHistoryCache[currentIndex] = JSON.parse(JSON.stringify(dancerHistoryCache[currentKey] || []));

            autoSaveToLocal();
            updateUI();
            showToast(`已儲存為新隊形 ${formations.length}`);
        }

        function updateCurrentFormation() {
            if (currentIndex === -1 || formations.length === 0) {
                showToast("請先點擊「新增隊形」！");
                return;
            }
            formations[currentIndex] = getStageState();
            autoSaveToLocal();
            updateUI(); 
            showToast(`隊形 ${currentIndex + 1} 已成功更新！`);
        }

        function prevFormation() {
            if (formations.length === 0 || currentIndex <= 0) return;
            currentIndex--;
            renderFormation(currentIndex);
            updateUI();
        }

        function nextFormation() {
            if (formations.length === 0 || currentIndex >= formations.length - 1) return;
            currentIndex++;
            renderFormation(currentIndex);
            updateUI();
        }

        function togglePlay() {
            const playBtn = document.getElementById('playBtn');
            const speed = parseFloat(document.getElementById('animSpeed').value);

            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                playBtn.textContent = "▶ 播放";
                playBtn.style.backgroundColor = ""; 
                playBtn.style.color = "";
            } else {
                if (formations.length < 2) {
                    showToast("請至少儲存兩個以上的隊形！");
                    return;
                }
                playBtn.textContent = "⏸ 暫停";
                playBtn.style.backgroundColor = "#f8fafc"; 
                playBtn.style.color = "#0f172a";

                const intervalTime = (speed + 0.4) * 1000; 

                playInterval = setInterval(() => {
                    currentIndex = (currentIndex < formations.length - 1) ? currentIndex + 1 : 0;
                    renderFormation(currentIndex);
                    updateUI();
                }, intervalTime);
            }
        }

        function exportFormations() {
            if (formations.length === 0) {
                showToast("目前沒有任何儲存的隊形可以匯出！");
                return;
            }
            const dataStr = JSON.stringify(formations, null, 2);
            const blob = new Blob([dataStr], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const today = new Date().toISOString().slice(0,10);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `舞蹈隊形備份_${today}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importFormations(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData) && importedData.length > 0 && Array.isArray(importedData[0])) {
                        showConfirm(`偵測到檔案內有 ${importedData.length} 個隊形，要覆蓋目前的進度並匯入嗎？`, () => {
                            if (playInterval) togglePlay(); 
                            formations = importedData;
                            dancerHistoryCache = {};
                            currentIndex = 0;
                            renderFormation(currentIndex);
                            updateUI();
                            autoSaveToLocal();
                            showToast("📥 隊形檔案匯入成功！");
                        });
                    } else {
                        alert("錯誤：這似乎不是正確的隊形備份檔案。");
                    }
                } catch (err) {
                    alert("讀取檔案失敗。");
                }
                input.value = ''; 
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            showConfirm("確定要刪除所有隊形、清除所有快取嗎？（此動作無法復原）", () => {
                if (playInterval) togglePlay();
                localStorage.removeItem('danceFormationsData');
                formations = [];
                dancerHistoryCache = {};
                currentIndex = -1;
                document.getElementById('dancerCountDisplay').textContent = "5 人";
                generateDefaultDancers(5);
                updateUI();
                showToast("🧹 已清除所有隊形與快取");
            });
        }
    </script>
</body>
</html>
